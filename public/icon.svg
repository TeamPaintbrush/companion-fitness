<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background with iOS-style rounded corners -->
  <rect width="100" height="100" rx="22" fill="#141414"/>
  <!-- HeartPulse icon (Lucide 24x24 scaled to fit, centered) -->
  <g transform="translate(13, 16) scale(2.917)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Heart outline in white -->
    <path stroke="#ffffff" stroke-width="0.72"
      d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
    <!-- EKG / heartbeat line in lime -->
    <path stroke="#c6f135" stroke-width="0.78"
      d="M3.22 12H9.5l1.5-2 2 4 1-2h6.78"/>
  </g>
</svg>
